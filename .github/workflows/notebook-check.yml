name: Notebook structure check

on:
  push:
  pull_request:

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: python -m pip install "nbformat>=5.10,<6"

      - name: Validate notebooks
        run: python scripts/validate_notebooks.py
